<html>
    <head>
        <title>Registration Page</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        
        <div class="register-container">
            <h1>Register</h1>
            <form id="registerForm" method="POST" action="ServletLR">
                                <input type="hidden" name="action" value="registerForm">

                <div class="form-group">
                    <label for="usernameregister">Username</label>
                    <input type="text" id="usernameregister" name="usernameregister" required>
                </div>
                <div class="form-group">
                    <label for="passwordregister">Password</label>
                    <input type="password" id="passwordregister" name="passwordregister" required>
                </div>
                <div class="form-group">
                    <label for="emailregister">Email</label>
                    <input type="text" id="emailregister" name="emailregister" required>
                    
                </div>
                <button type="submit">Register</button>
        
            </form>
             <p>Already have an account? <a href="login.html">Login here</a></p>
                 </div>
    </body>
</html>
